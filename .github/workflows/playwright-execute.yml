name: Playwright Execution

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: Pipeline ID
        required: true
        type: string
      branch:
        description: Branch to test
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --workers=1
        continue-on-error: true

      - name: Push results to branch
        if: always()
        env:
          BRANCH: ${{ github.event.inputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f test-results/results.json ]; then
            cp test-results/results.json execution-results.json
          else
            echo '{"error":"no results","stats":{"expected":0,"unexpected":0,"skipped":0,"duration":0}}' > execution-results.json
          fi
          git add execution-results.json -f
          git commit -m "ci: execution results [skip ci]" || true
          git push origin HEAD:${BRANCH} || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
          if-no-files-found: ignore
