name: Playwright Execution

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: Pipeline ID
        required: true
        type: string
      branch:
        description: Branch to test
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: test_run
        run: |
          npx playwright test --project=chromium --workers=1 --reporter=json 2>&1 | tee playwright-output.json || true
          if [ -f test-results/results.json ]; then
            echo "results_json=$(cat test-results/results.json | base64 -w 0)" >> $GITHUB_OUTPUT
          elif [ -f playwright-output.json ]; then
            echo "results_json=$(cat playwright-output.json | base64 -w 0)" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            playwright-output.json
          retention-days: 30
          if-no-files-found: ignore
